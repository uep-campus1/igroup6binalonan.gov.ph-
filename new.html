<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UEP News Portal</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}

body{
min-height:100vh;
display:flex;
flex-direction:column;
color:white;
animation:fade 1s ease;
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:url("uep.jpg") center/cover no-repeat;
filter:blur(6px) brightness(0.6);
z-index:-1;
}

/* HEADER (FIXED) */
header{
background:linear-gradient(90deg,maroon,#b30000);
padding:15px;
display:flex;
justify-content:space-between;
font-size:22px;
font-weight:bold;
animation:drop 0.6s ease;

position:fixed;
top:0;
left:0;
width:100%;
z-index:1000;
}

@keyframes drop{
from{transform:translateY(-40px);opacity:0;}
to{transform:translateY(0);opacity:1;}
}

.btn{
background:white;
color:maroon;
padding:8px 15px;
border-radius:20px;
text-decoration:none;
transition:0.3s;
}

.btn:hover{
transform:scale(1.1) rotate(-2deg);
}

/* GRID */
.container{
padding:100px 30px 30px;
flex:1;
}

.news-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;
}

.news-card{
background:rgba(0,0,0,0.75);
border-radius:15px;
overflow:hidden;
cursor:pointer;
transition:0.4s;
box-shadow:0 0 15px rgba(255,255,255,0.05);
}

.news-card:hover{
transform:translateY(-10px) scale(1.03);
box-shadow:0 0 25px rgba(255,255,255,0.25);
}

.news-card img{
width:100%;
height:260px;
object-fit:cover;
transition:0.4s;
}

.news-card:hover img{
transform:scale(1.1);
}

.news-content{padding:15px;}

/* VIDEO */
.video-section{
text-align:center;
margin-top:40px;
}

video{
width:85%;
max-width:650px;
border-radius:15px;
box-shadow:0 0 20px rgba(255,255,255,0.2);
}

/* FOOTER */
footer{
background:maroon;
text-align:center;
padding:10px;
}

/* MODAL BACKGROUND */
.modal{
display:none;
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
justify-content:center;
align-items:center;
animation:fadeBG 0.3s ease;
}

/* MODAL BOX */
.modal-content{
background:white;
color:black;
padding:25px;
width:90%;
max-width:800px;
max-height:90vh;
overflow-y:auto;
border-radius:15px;
line-height:1.8;

animation:pop 0.4s ease;
}

@keyframes pop{
from{transform:scale(0.6);opacity:0;}
to{transform:scale(1);opacity:1;}
}

/* TITLE ANIMATION */
#title{
font-size:22px;
margin-bottom:10px;
background:linear-gradient(90deg,maroon,red,pink);
-webkit-background-clip:text;
color:transparent;
animation:glow 1s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 5px pink;}
to{text-shadow:0 0 15px red;}
}

/* TEXT */
#text{
white-space:pre-line;
font-size:15px;
animation:fadeText 0.6s ease;
}

@keyframes fadeText{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

.close{
float:right;
font-size:25px;
cursor:pointer;
font-weight:bold;
color:maroon;
}

.close:hover{
transform:rotate(90deg);
}
</style>
</head>

<body>

<header>
UEP NEWS PORTAL
<a class="btn" href="file:///C:/Users/buent/OneDrive/Desktop/MOSADA,%20WEBPAGE/MOSADA,%20WEBPAGE.html" onclick="history.back()">Return</a>
</header>

<div class="container">

<div class="news-grid">

<div class="news-card" onclick="show(1)">
<img src="n.jpg">
<div class="news-content">
<h3>TES Reimbursement</h3>
<p>Click for full details ✨</p>
</div>
</div>

<div class="news-card" onclick="show(2)">
<img src="e.jpg">
<div class="news-content">
<h3>MATHTEX 2026 Training</h3>
<p>Click for full details 📘</p>
</div>
</div>

<div class="news-card" onclick="show(3)">
<img src="w.jpg">
<div class="news-content">
<h3>THE Asia Rankings</h3>
<p>Click for full details 🌍</p>
</div>
</div>

</div>

<div class="video-section">
<h2>Watch Latest Video</h2>
<video controls>
<source src="vid.mp4" type="video/mp4">
</video>
</div>

</div>

<footer>
© 2026 University of Eastern Pangasinan | NEWS
</footer>

<div class="modal" id="modal">
<div class="modal-content">
<span class="close" onclick="closeModal()">&times;</span>
<h2 id="title"></h2>
<p id="text"></p>
</div>
</div>

<script>

const newsData = {

1:`UEP FACULTY JOIN MATHTEX 2026 ALGEBRA TRAINING

ATTENTION: TES REIMBURSEMENT FOR BOARD EXAMINEES (2023–2025)

Good news for our board examinees!

If you were a TES beneficiary and already took your licensure exam, you may apply for reimbursement.

Eligibility:
• TES Grantee Batch 2023–2025
• Already completed licensure exam
• Not yet filed reimbursement

Covered expenses:
• Review Center Fees
• Exam Application Fees
• Notarial Fees

IMPORTANT:
Only ORIGINAL RECEIPTS are accepted.

Application Process:
1. Go to Finance Office
2. Download forms
3. Submit requirements or via proxy

Deadline: MAY 5, 2026`,

2:`UEP MATHTEX 2026 TRAINING

UEP faculty participated in Algebra Training at UPLB (April 23–25, 2026).

Covered topics:
• Equations and Inequalities
• Functions
• Sequences and Series

Method used: 4As (Activity, Analysis, Abstraction, Application)

Improved teaching strategies and mathematics skills.`,

3:`UEP REPORTER STATUS - THE ASIA RANKINGS 2026

UEP obtained Reporter Status in THE Asia Rankings 2026.

Meaning:
• Submitted data to global ranking system
• Part of benchmarking process
• Not yet officially ranked

This shows UEP’s progress in global education excellence.`

};

const titles = {
1:"TES Reimbursement Announcement",
2:"MATHTEX 2026 Training",
3:"THE Asia Rankings 2026"
};

function typeText(text, el){
el.innerText = "";
let i = 0;

function typing(){
if(i < text.length){
el.innerText += text.charAt(i);
i++;
setTimeout(typing, 10);
}
}
typing();
}

function show(id){
document.getElementById("modal").style.display="flex";
document.getElementById("title").innerText = titles[id];
typeText(newsData[id], document.getElementById("text"));
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

window.onclick=function(e){
if(e.target.id==="modal"){
closeModal();
}
}

</script>

</body>
</html>
